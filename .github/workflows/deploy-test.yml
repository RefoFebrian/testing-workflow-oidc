name: OIDC SSM Deploy Testing

on:
  push:
    branches:
      - main  # Berjalan otomatis setiap ada perubahan di branch main

# Izin wajib agar GitHub bisa menerbitkan token OIDC
permissions:
  id-token: write
  contents: read

jobs:
  deploy-to-homeserver:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Request AWS Access via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Ini akan menukarkan token OIDC dengan kredensial sementara
          role-to-assume: arn:aws:iam::160358212080:role/Role-GitHubActions-Testing
          aws-region: ap-southeast-1

      - name: 3. Execute Command via AWS SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=InstanceIds,Values=mi-06856330d84cefc91" \
            --parameters 'commands=["echo \"[SUKSES] OIDC Workflow Berjalan!\"", "echo \"Dieksekusi oleh: $(whoami)\"", "echo \"Hostname Server: $(hostname)\"", "uptime"]' \
            --region ap-southeast-1 \
            --comment "Testing OIDC Deployment from GitHub Actions"
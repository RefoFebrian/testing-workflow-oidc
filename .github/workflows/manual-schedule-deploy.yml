name: 2. CD - Restart Docker Service

on:
  workflow_dispatch: # 1. TRIGGER MANUAL: Memunculkan tombol "Run workflow" di GitHub
  schedule:          # 2. TRIGGER TERJADWAL (Cron dalam format UTC)
    - cron: '15 5 * * *'  # Berjalan otomatis setiap jam 12:15 WIB
    - cron: '0 14 * * *'  # Berjalan otomatis setiap jam 21:00 WIB

permissions:
  id-token: write
  contents: read

jobs:
  restart-service:
    runs-on: ubuntu-latest
    steps:
      - name: Request AWS Access via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::160358212080:role/Role-GitHubActions-Testing
          aws-region: ap-southeast-1

      - name: Execute Restart Command via AWS SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=InstanceIds,Values=mi-0f202d984b13ab8e4" \
            --parameters 'commands=["cd /home/serverusus/testing-workflow-oidc", "docker compose up -d", "docker system prune -f"]' \
            --region ap-southeast-1 \
            --comment "Deploy and Restart Container"